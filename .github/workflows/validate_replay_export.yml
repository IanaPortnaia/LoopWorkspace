name: Validate Replay Export

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/validate_replay_export.yml"
      - "LoopWorkspace.xcworkspace/xcshareddata/xcschemes/NightscoutReplayValidation.xcscheme"
      - "LoopWorkspace.xcworkspace/xcshareddata/xcschemes/ReplayCoreRegression.xcscheme"
      - "REPLAY_EXPORT_SAFETY.md"
      - "Scripts/validate_replay_export_patch.py"
      - "replay-export/**"

jobs:
  validate:
    name: Compile and test without distribution signing
    runs-on: macos-26
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer

      - name: Validate patch boundary
        run: python3 Scripts/validate_replay_export_patch.py

      - name: Apply staged patch
        run: git apply replay-export/replay-export-v1.patch

      - name: Verify applied production diff
        shell: bash
        run: |
          set -euo pipefail
          git -C NightscoutService diff --check
          changed_files="$(git -C NightscoutService diff --name-only | sort)"
          expected_files=$'NightscoutServiceKit/Extensions/StoredDosingDecision.swift\nNightscoutServiceKitTests/BolusRemoteNotificationTestCase.swift'
          test "$changed_files" = "$expected_files"

      - name: Select simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          device_id="$(
            xcrun simctl list devices available -j |
              python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(d["udid"] for devices in data["devices"].values() for d in devices if d["name"].startswith("iPhone")))'
          )"
          echo "device_id=$device_id" >> "$GITHUB_OUTPUT"

      - name: Test Nightscout replay serialization
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace LoopWorkspace.xcworkspace \
            -scheme NightscoutReplayValidation \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            -only-testing:NightscoutServiceKitTests/ReplayCaptureTestCase \
            CODE_SIGNING_ALLOWED=NO

      - name: Run LoopKit dose math regression tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace LoopWorkspace.xcworkspace \
            -scheme ReplayCoreRegression \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            -only-testing:LoopKitTests/DoseMathTests \
            CODE_SIGNING_ALLOWED=NO

      - name: Compile Loop without signing
        run: |
          set -o pipefail
          xcodebuild build \
            -workspace LoopWorkspace.xcworkspace \
            -scheme Loop \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify core repositories remain unchanged
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git -C Loop diff --name-only)"
          test -z "$(git -C LoopKit diff --name-only)"

      - name: Run isolated Loop dosing regression tests
        shell: bash
        run: |
          set -uo pipefail
          tests=(
            "LoopTests/LoopDataManagerDosingTests/testForecastFromLiveCaptureInputData"
            "LoopTests/LoopDataManagerDosingTests/testFlatAndStable"
            "LoopTests/LoopDataManagerDosingTests/testHighAndStable"
            "LoopTests/LoopDataManagerDosingTests/testHighAndFalling"
            "LoopTests/LoopDataManagerDosingTests/testHighAndRisingWithCOB"
            "LoopTests/LoopDataManagerDosingTests/testLowAndFallingWithCOB"
            "LoopTests/LoopDataManagerDosingTests/testLowWithLowTreatment"
            "LoopTests/LoopDataManagerDosingTests/testValidateMaxTempBasalDoesntCancelTempBasalIfHigher"
            "LoopTests/LoopDataManagerDosingTests/testValidateMaxTempBasalCancelsTempBasalIfLower"
            "LoopTests/LoopDataManagerDosingTests/testOpenLoopCancelsTempBasal"
            "LoopTests/LoopDataManagerDosingTests/testReceivedUnreliableCGMReadingCancelsTempBasal"
            "LoopTests/LoopDataManagerDosingTests/testLoopEnactsTempBasalWithoutManualBolusRecommendation"
            "LoopTests/LoopDataManagerDosingTests/testLoopRecommendsTempBasalWithoutEnactingIfOpenLoop"
            "LoopTests/LoopDataManagerDosingTests/testIsClosedLoopAvoidsTriggeringTempBasalCancelOnCreation"
            "LoopTests/LoopDataManagerDosingTests/testAutoBolusMaxIOBClamping"
            "LoopTests/LoopDataManagerDosingTests/testTempBasalMaxIOBClamping"
          )
          failures=()
          passed_tests=()

          for test_identifier in "${tests[@]}"; do
            test_name="${test_identifier##*/}"
            passed=false

            for attempt in 1 2 3; do
              test_log="$RUNNER_TEMP/loop-dosing-${test_name}-attempt-${attempt}.log"
              echo "Running ${test_name}, attempt ${attempt}/3"

              set +e
              xcodebuild test \
                -workspace LoopWorkspace.xcworkspace \
                -scheme ReplayCoreRegression \
                -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
                -parallel-testing-enabled NO \
                -only-testing:"$test_identifier" \
                2>&1 | tee "$test_log"
              test_status="${PIPESTATUS[0]}"
              set -e

              if test "$test_status" -eq 0; then
                passed=true
                passed_tests+=("${test_name}:attempt-${attempt}")
                break
              fi
            done

            if test "$passed" != true; then
              failures+=("$test_name")
            fi
          done

          echo "## Isolated Loop dosing regression tests" >> "$GITHUB_STEP_SUMMARY"
          printf -- '- `%s`\n' "${passed_tests[@]}" >> "$GITHUB_STEP_SUMMARY"
          if test "${#failures[@]}" -eq 0; then
            echo "All sixteen selected tests completed successfully." >> "$GITHUB_STEP_SUMMARY"
          else
            printf 'Failed after three isolated attempts: `%s`\n' "${failures[*]}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload Loop dosing diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loop-dosing-regression-diagnostics
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/loop-dosing-*.log
            ${{ runner.temp }}/loop-dosing-*.json
